<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pane Street</title>
  <link rel="stylesheet" href="vendor/xterm/xterm.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <div class="resize-handle resize-handle-right" id="sidebar-resize"></div>
      <div id="sidebar-header">
        <h2>Sessions</h2>
        <div id="sidebar-header-actions">
          <button id="sidebar-toggle" class="sidebar-header-btn" title="Collapse sidebar">&#8249;</button>
        </div>
      </div>
      <button id="new-session-btn"><span class="btn-icon">+</span><span class="btn-text"> New Terminal</span></button>
      <div id="session-list"></div>
      <div id="sidebar-actions">
        <button id="config-scheduled-btn" data-icon="&#9201;"><span class="btn-text">Scheduled</span></button>
        <button id="config-plugins-btn" data-icon="&#9881;"><span class="btn-text">Plugins</span></button>
        <button id="config-mcps-btn" data-icon="&#9879;"><span class="btn-text">MCPs</span></button>
        <button id="config-memory-btn" data-icon="&#9733;"><span class="btn-text">Memory</span></button>
        <button id="settings-btn" data-icon="&#9881;"><span class="btn-text">Settings</span></button>
      </div>
    </div>
    <div id="main">
      <div id="toolbar">
        <div id="toolbar-left">
          <div id="toolbar-layout-toggle"></div>
        </div>
        <div id="toolbar-right">
          <button id="notification-toggle-btn" class="toolbar-btn" title="Notifications (&#8984;I)"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1.5a4.5 4.5 0 00-4.5 4.5c0 2.5-1.5 4-1.5 4h12s-1.5-1.5-1.5-4A4.5 4.5 0 008 1.5z"/><path d="M6 13a2 2 0 004 0"/></svg><span id="notification-count-badge" class="notification-count-badge" style="display:none">0</span> <span class="toolbar-btn-label">Alerts</span></button>
          <button id="fv-toggle-btn" class="toolbar-btn" title="Toggle file viewer (&#8984;&#8679;E)"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3.5A1.5 1.5 0 013.5 2h3l2 2h4A1.5 1.5 0 0114 5.5v7a1.5 1.5 0 01-1.5 1.5h-9A1.5 1.5 0 012 12.5z"/></svg> <span class="toolbar-btn-label">Files</span></button>
        </div>
      </div>
      <div id="content-area">
        <div id="pane-grid"></div>
        <div id="settings-panel" class="config-panel" style="display:none"></div>
        <div id="plugins-panel" class="config-panel" style="display:none"></div>
        <div id="mcps-panel" class="config-panel" style="display:none"></div>
        <div id="memory-panel" class="config-panel" style="display:none"></div>
        <div id="scheduled-panel" class="config-panel" style="display:none"></div>
      </div>
      <div id="notification-panel" style="display:none">
        <div class="notif-panel-header">
          <h2>Notifications</h2>
          <div class="notif-panel-actions">
            <button id="notif-clear-btn" class="fv-action-btn" title="Clear all">Clear</button>
            <button id="notif-close-btn" class="fv-action-btn" title="Close">&times;</button>
          </div>
        </div>
        <div id="notif-content" class="notif-panel-body"></div>
      </div>
      <div id="file-viewer" style="display:none" tabindex="0">
        <div class="resize-handle resize-handle-left" id="fv-resize"></div>
        <div class="file-viewer-header">
          <button id="fv-back" class="fv-nav-btn" title="Go to parent directory">&#8593;</button>
          <span class="file-viewer-path" id="fv-path"></span>
          <div class="file-viewer-actions">
            <button id="fv-toggle-view" class="fv-action-btn" title="Toggle rendered/raw" style="display:none">Raw</button>
            <button id="fv-open-default" class="fv-action-btn" title="Open with default app" style="display:none">Open</button>
            <button id="fv-finder" class="fv-action-btn" title="Open in Finder">Finder</button>
            <button id="fv-close" class="fv-action-btn" title="Close">&times;</button>
          </div>
        </div>
        <div class="file-viewer-tree" id="fv-tree"></div>
        <div class="file-viewer-content" id="fv-content" style="display:none"></div>
      </div>
      <div id="footer">
        <div class="resize-handle resize-handle-top" id="footer-resize-handle"></div>
        <button id="footer-expand-toggle" class="footer-chevron" title="Expand git timeline" style="display:none">&#9662;</button>
        <span id="footer-git"></span>
        <span id="footer-pills"></span>
        <div id="footer-branch-graph" class="footer-branch-graph"></div>
      </div>
    </div>
  </div>

  <!-- Robot overlay (above all content) -->
  <div id="robot-overlay">
    <span id="footer-mascot">
      <span id="mascot-speech" class="mascot-speech"></span>
      <svg viewBox="0 0 36 38" width="68" height="72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g class="robot-body">
          <!-- Antenna (springy, personality-driven) -->
          <g class="robot-antenna">
            <path d="M18 6.5 Q18 3 17 1.5" stroke="var(--text-secondary)" stroke-width="1.2" stroke-linecap="round" fill="none"/>
            <circle cx="17" cy="1.2" r="1.6" fill="var(--accent)"/>
          </g>
          <!-- Head (large, rounded — like reference) -->
          <g class="robot-head">
            <!-- White head shell -->
            <rect x="6.5" y="5.5" width="23" height="16" rx="8" fill="var(--text-secondary)"/>
            <!-- Shine highlight on top of head -->
            <path d="M14 6.5 Q18 5 22 6.5" stroke="#fff" stroke-width="0.6" opacity="0.3" fill="none" stroke-linecap="round"/>
            <!-- Dark visor/face plate -->
            <rect x="9.5" y="8.5" width="17" height="11" rx="5" fill="#111"/>
            <!-- Ear discs (like headphones) -->
            <ellipse cx="7" cy="13.5" rx="2.2" ry="2.5" fill="var(--text-secondary)"/>
            <ellipse cx="7" cy="13.5" rx="1.2" ry="1.4" fill="var(--text-muted)" opacity="0.4"/>
            <ellipse cx="29" cy="13.5" rx="2.2" ry="2.5" fill="var(--text-secondary)"/>
            <ellipse cx="29" cy="13.5" rx="1.2" ry="1.4" fill="var(--text-muted)" opacity="0.4"/>
            <!-- Eyes (glowing accent arcs — happy expression) -->
            <g class="robot-eyes">
              <!-- Left eye: arc (happy squint) -->
              <path class="robot-eye-l" d="M12.5 12.5 Q14.5 10 16.5 12.5" stroke="var(--accent)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
              <!-- Right eye: arc (happy squint) -->
              <path class="robot-eye-r" d="M19.5 12.5 Q21.5 10 23.5 12.5" stroke="var(--accent)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
            </g>
            <!-- Mouth (small glowing smile) -->
            <g class="robot-mouth">
              <path d="M15.5 16 Q18 18 20.5 16" stroke="var(--accent)" stroke-width="1" fill="none" stroke-linecap="round"/>
            </g>
          </g>
          <!-- Body (solid with depth tinting) -->
          <rect x="12" y="22" width="12" height="7" rx="3" fill="var(--text-secondary)"/>
          <!-- Body top highlight -->
          <rect x="12.5" y="22.5" width="11" height="3" rx="2" fill="#fff" opacity="0.09"/>
          <!-- Body bottom shadow -->
          <rect x="12" y="26" width="12" height="3" rx="1.5" fill="#000" opacity="0.1"/>
          <!-- Arms (rounded, white) -->
          <rect class="robot-arm-l" x="6.5" y="22.5" width="4.5" height="5" rx="2.2" fill="var(--text-secondary)"/>
          <rect class="robot-arm-r" x="25" y="22.5" width="4.5" height="5" rx="2.2" fill="var(--text-secondary)"/>
          <!-- Broom prop (hidden by default, shown during broom special event) -->
          <g class="robot-broom-prop">
            <line x1="28" y1="24" x2="34" y2="33" stroke="var(--text-secondary)" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
            <path d="M31 33 Q35 31 36.5 34 Q34 36.5 31 35 Z" fill="var(--text-muted)" opacity="0.55"/>
          </g>
          <!-- Legs (short, sturdy) -->
          <g class="robot-leg-left">
            <rect x="13.5" y="29" width="3.5" height="3.5" rx="1.2" fill="var(--text-secondary)"/>
            <rect x="12.5" y="32" width="5.5" height="2" rx="1" fill="var(--text-muted)" opacity="0.5"/>
          </g>
          <g class="robot-leg-right">
            <rect x="19" y="29" width="3.5" height="3.5" rx="1.2" fill="var(--text-secondary)"/>
            <rect x="18" y="32" width="5.5" height="2" rx="1" fill="var(--text-muted)" opacity="0.5"/>
          </g>
        </g>
        <ellipse class="robot-shadow" cx="18" cy="35" rx="9" ry="1.3" fill="rgba(0,0,0,0.1)"/>
      </svg>
    </span>
    <div id="robot-prop-desk">
      <svg viewBox="0 0 80 30" width="160" height="60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Desk surface -->
        <rect x="0" y="8" width="80" height="5" rx="1.5" fill="var(--text-secondary)" opacity="0.6"/>
        <rect x="0" y="12" width="80" height="1.5" fill="#000" opacity="0.1"/>
        <!-- Legs -->
        <rect x="4" y="13" width="3" height="16" rx="1" fill="var(--text-muted)" opacity="0.45"/>
        <rect x="73" y="13" width="3" height="16" rx="1" fill="var(--text-muted)" opacity="0.45"/>
        <!-- Monitor -->
        <rect x="28" y="-10" width="24" height="16" rx="2" fill="var(--bg-card)" stroke="var(--text-secondary)" stroke-width="0.8" opacity="0.85"/>
        <rect x="30" y="-8" width="20" height="12" rx="1" fill="var(--accent)" opacity="0.07"/>
        <rect x="38" y="6" width="4" height="3" rx="0.5" fill="var(--text-secondary)" opacity="0.4"/>
        <rect x="35" y="8" width="10" height="1.5" rx="0.5" fill="var(--text-secondary)" opacity="0.35"/>
      </svg>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>

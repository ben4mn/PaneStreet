name: Copy Signing Key
on:
  workflow_dispatch:

jobs:
  copy-key:
    runs-on: ubuntu-latest
    steps:
      - name: Copy signing key to Windows repo
        env:
          TAURI_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          pip install pynacl
          python3 << 'PYEOF'
          import base64, json, os, urllib.request
          from nacl import encoding, public

          REPO_PUB_KEY = "NYYnqE7YCMsbVQe6Q79K1fLHViQEH26mI0aYwI/5tUQ="
          KEY_ID = "3380204578043523366"
          PAT = os.environ["PAT"]
          TAURI_KEY = os.environ["TAURI_KEY"]

          def encrypt_secret(public_key_b64, secret_value):
              pk = public.PublicKey(public_key_b64.encode("utf-8"), encoding.Base64Encoder())
              sealed = public.SealedBox(pk).encrypt(secret_value.encode("utf-8"))
              return base64.b64encode(sealed).decode("utf-8")

          encrypted = encrypt_secret(REPO_PUB_KEY, TAURI_KEY)
          data = json.dumps({"encrypted_value": encrypted, "key_id": KEY_ID}).encode()
          req = urllib.request.Request(
              "https://api.github.com/repos/ben4mn/PaneStreetWindows/actions/secrets/TAURI_SIGNING_PRIVATE_KEY",
              data=data, method="PUT",
              headers={"Authorization": f"token {PAT}", "Accept": "application/vnd.github+json", "Content-Type": "application/json"}
          )
          resp = urllib.request.urlopen(req)
          print(f"Secret copied: HTTP {resp.status}")
          PYEOF
